apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: k0s-cluster
  user: admin
spec:
  hosts:
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3000
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-kc-00
      role: controller+worker
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3001
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-kc-01
      role: controller+worker
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3002
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-kc-02
      role: controller+worker
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3003
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-ki-00
      role: worker
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3004
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-ki-01
      role: worker
    - openSSH:
        address: 127.0.0.1
        user: root
        port: 3005
        keyPath: ~/.ssh/id_ed25519
      hostname: distro-ki-02
      role: worker
