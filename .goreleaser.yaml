# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./.
    binary: cargoship
    ldflags:
      - -s
      - -w
      - -X github.com/colonel-byte/cargoship/src/config.CLIVersion={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - arm
      - arm64
      - amd64
    goamd64:
      - v1
    goarm:
      - "6"
      - "7"

archives:
  - formats:
      - tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

nfpms:
  - id: packagers
    package_name: cargoship
    license: Apache 2.0
    maintainer: |-
      Allen Conlon <software@conlon.dev>
    formats:
      - apk
      - deb
      - rpm
    goamd64:
      - v1
    mtime: "{{ .CommitDate }}"
    rpm:
      compression: gzip
      prefixes:
        - /usr/bin
      signature:
        key_file: '{{ if ne (index .Env "GPG_KEY_PATH") "" }}{{ .Env.GPG_KEY_PATH }}{{ else }}{{ end }}'
    deb:
      compression: zstd
      signature:
        key_file: '{{ if ne (index .Env "GPG_KEY_PATH") "" }}{{ .Env.GPG_KEY_PATH }}{{ else }}{{ end }}'
    apk:
      signature:
        key_file: '{{ if ne (index .Env "GPG_KEY_PATH") "" }}{{ .Env.GPG_KEY_PATH }}{{ else }}{{ end }}'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    stdin: "{{ .Env.COSIGN_PWD }}"

release:
  footer: |-
    ---
    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
