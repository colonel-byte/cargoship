---
# yaml-language-server: $schema=zarf-v1alpha1-cluster-schema.json
kind: ZarfCluster
metadata:
  name: rancher-rke2
spec:
  config:
    loadbalancer: example.com
    registries:
      - name: docker.io
        proxy:
          url: mirror-docker-hub.example.com
    profiles:
      - name: global
        kubeletConfig:
          evictionHard:
            memory.available: "500Mi"
            nodefs.available: "1Gi"
            imagefs.available: "100Gi"
          evictionMinimumReclaim:
            memory.available: "0Mi"
            nodefs.available: "500Mi"
            imagefs.available: "2Gi"
        engineConfig:
          profile: cis
          embedded-registry: true
          selinux: true
          private-registry: /etc/rancher/rke2/registries.yaml
      - name: control-plane
        engineConfig:
          node-taint:
            - CriticalOnly=True:NoExecute
      - name: infrastructure
        engineConfig:
          node-label:
            - node-role.kubernetes.io/infrastructure="true"
          node-taint:
            - InfrastructureOnly=True:NoExecute
  hosts:
    - role: controller
      profile: control-plane
      environment:
        HTTP_PROXY: 10.0.0.1:443
      ssh:
        address: 1.1.1.1
        user: root
        port: 22
      privateInterface: eth1
      privateAddress: 10.0.0.3
    - hostname: control-plane-02
      role: controller
      profile: control-plane
      environment:
        HTTP_PROXY: 10.0.0.1:443
      openSSH:
        address: 10.0.0.3
        user: ubuntu
        options:
          ForwardAgent: true
          StrictHostkeyChecking: false
    - hostname: infra-01
      role: worker
      profile: infrastructure
      openSSH:
        address: 10.0.0.4
