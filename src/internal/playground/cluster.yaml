---
# yaml-language-server: $schema=../../../schema/zarf-v1alpha1-cluster-schema.json
kind: ZarfCluster
metadata:
  name: rancher-rke2
spec:
  config:
    type: rke2
    registries:
      - name: docker.io
        proxy:
          url: mirror-docker-hub.example.com
    profiles:
      - name: global
        kubeletConfig:
          evictionHard:
            memory.available: "500Mi"
            nodefs.available: "1Gi"
            imagefs.available: "100Gi"
          evictionMinimumReclaim:
            memory.available: "0Mi"
            nodefs.available: "500Mi"
            imagefs.available: "2Gi"
        engineConfig:
          profile: cis
          embedded-registry: true
          selinux: true
          private-registry: /etc/rancher/rke2/registries.yaml
      - name: control-plane
        engineConfig:
          node-taint:
            - CriticalOnly=True:NoExecute
      - name: infrastructure
        engineConfig:
          node-label:
            - node-role.kubernetes.io/infrastructure="true"
          node-taint:
            - InfrastructureOnly=True:NoExecute
  hosts:
    - role: controller
      hostname: distro-kc01
      openSSH:
        address: 127.0.0.1
        user: root
        port: 3000
        keyPath: ~/.ssh/id_ed25519
