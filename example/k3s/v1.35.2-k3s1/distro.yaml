---
# yaml-language-server: $schema=../../../schema/zarf-v1alpha1-distro-package-schema.json
kind: ZarfDistro
metadata:
  name: rancher-k3s
  version: 1.35.2-k3s1
  architecture: amd64
spec:
  type: k3s
  version: 1.35.2-k3s1
  config:
    engine:
      config:
        # keep-sorted start block=yes
        cluster-cidr: 10.42.0.0/16
        cluster-domain: cluster.local
        cni:
          - cilium
        disable-cloud-controller: true
        disable-kube-proxy: true
        embedded-registry: false
        etcd-arg:
          - "quota-backend-bytes=8589934592" # 8GB
          - "auto-compaction-retention=1h"
        kube-apiserver-arg:
          - anonymous-auth=false
          - audit-log-mode=blocking-strict
          - audit-log-maxage=30
          - authorization-mode=RBAC,Node
          - "tls-min-version=VersionTLS12"
          - "service-account-extend-token-expiration=false"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        kube-controller-manager-arg:
          - "tls-min-version=VersionTLS12"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
          - bind-address=127.0.0.1
          - use-service-account-credentials=true
        kube-proxy-arg:
          - "ipvs-strict-arp=true"
        kube-scheduler-arg:
          - "tls-min-version=VersionTLS12"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        kubelet-arg:
          - authorization-mode=Webhook
          - anonymous-auth=false
          - streaming-connection-idle-timeout=5m
          - read-only-port=0
        protect-kernel-defaults: true
        selinux: true
        service-cidr: 10.43.0.0/16
        write-kubeconfig-mode: "0600"
        # keep-sorted end
      audit:
        rules:
          - level: None
      podSecurity:
        plugins:
          - name: PodSecurity
            configuration:
              apiVersion: pod-security.admission.config.k8s.io/v1beta1
              kind: PodSecurityConfiguration
              defaults:
                enforce: "restricted"
                enforce-version: "latest"
                audit: "restricted"
                audit-version: "latest"
                warn: "restricted"
                warn-version: "latest"
              exemptions:
                usernames: []
                runtimeClasses: []
                namespaces:
                  - kube-system
                  - rook-ceph
                  - zarf
    os:
      sysctl:
        # Istio related sysctl overrides
        "fs.inotify.max_user_watches": "11048576"
        "fs.inotify.max_user_instances": "8192"
        # Misc performance
        "vm.max_map_count": "262144"
        "fs.file-max": "2097152"
        # Network tuning
        "net.core.somaxconn": "32768"
        "net.ipv4.tcp_max_syn_backlog": "8192"
        "net.core.netdev_max_backlog": "16384"
        # NFTABLES
        "net.netfilter.nf_conntrack_max": "1000000"
        "net.netfilter.nf_conntrack_buckets": "250000"
        "net.netfilter.nf_conntrack_tcp_timeout_established": "86400"
        "net.netfilter.nf_conntrack_tcp_timeout_close_wait": "3600"
        # Network
        "net.ipv4.ip_forward": "1"
        "net.ipv6.conf.all.forwarding": "1"
        "net.bridge.bridge-nf-call-iptables": "1"
        "net.bridge.bridge-nf-call-ip6tables": "1"
        # RKE2 related sysctl overrides
        "vm.panic_on_oom": "0"
        "vm.overcommit_memory": "1"
        "kernel.panic": "10"
        "kernel.panic_on_oops": "1"
      fapolicyd: |
        # Allow RKE2 to function
        allow perm=any all : dir=/opt/cni/
        allow perm=any all : dir=/run/k3s/
        allow perm=any all : dir=/var/lib/kubelet/
        allow perm=any all : dir=/var/lib/rancher/
      files:
        - source: https://github.com/k3s-io/k3s/releases/download/v1.35.2%2Bk3s1/k3s
          target: /usr/local/bin/k3s
          executable: true
          selector:
            package: binary
        - source: ../core/server.service
          target: /etc/systemd/system/k3s-server.service
          symlinks:
            - /etc/systemd/system/multi-user.target.wants/k3s-server.service
          selector:
            package: binary
            profile: controller
        - source: ../core/agent.service
          target: /etc/systemd/system/k3s-agent.service
          symlinks:
            - /etc/systemd/system/multi-user.target.wants/k3s-agent.service
          selector:
            package: binary
            profile: worker
        - source: https://rpm.rancher.io/k3s/latest/common/centos/9/noarch/k3s-selinux-1.6-1.el9.noarch.rpm
          target: /var/lib/rancher/k3s/rpm/k3s-selinux-1.6-1.el9.noarch.rpm
          selector:
            package: binary
    imageConfig:
      path: /var/lib/rancher/k3s/agent/images
      compression: none
      images:
        - docker.io/rancher/klipper-helm:v0.9.14-build20260210
        - docker.io/rancher/klipper-lb:v0.4.14
        - docker.io/rancher/local-path-provisioner:v0.0.34
        - docker.io/rancher/mirrored-coredns-coredns:1.14.1
        - docker.io/rancher/mirrored-library-busybox:1.37.0
        - docker.io/rancher/mirrored-library-traefik:3.6.9
        - docker.io/rancher/mirrored-metrics-server:v0.8.1
        - docker.io/rancher/mirrored-pause:3.6
