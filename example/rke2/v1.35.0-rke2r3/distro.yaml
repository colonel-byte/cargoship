---
# yaml-language-server: $schema=../../../schema/zarf-v1alpha1-distro-package-schema.json
kind: ZarfDistro
metadata:
  name: rancher-rke2
  version: 1.35.0-rke2r3
  architecture: amd64
spec:
  type: rke2
  version: 1.35.0-rke2r3
  actions:
    onCreate:
      before:
        - description: pull rke2 tar-ball
          cmd: |-
            rm -rf   target
            mkdir -p target
            echo https://github.com/rancher/rke2/releases/download/v1.35.0%2Brke2r3/rke2.linux-amd64.tar.gz
            curl -L -o ./target/rke2.linux-amd64.tar.gz https://github.com/rancher/rke2/releases/download/v1.35.0%2Brke2r3/rke2.linux-amd64.tar.gz
      after:
        - description: clean up after
          cmd: |-
            rm -rf   target
  config:
    engine:
      config:
        # keep-sorted start block=yes
        cluster-cidr: 10.42.0.0/16
        cluster-domain: cluster.local
        cni:
          - cilium
        disable-cloud-controller: true
        disable-kube-proxy: true
        disable:
          - rke2-ingress-nginx
        embedded-registry: false
        etcd-arg:
          - "quota-backend-bytes=8589934592" # 8GB
          - "auto-compaction-retention=1h"
        kube-apiserver-arg:
          - anonymous-auth=false
          - audit-log-mode=blocking-strict
          - audit-log-maxage=30
          - authorization-mode=RBAC,Node
          - "tls-min-version=VersionTLS12"
          - "service-account-extend-token-expiration=false"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        kube-controller-manager-arg:
          - "tls-min-version=VersionTLS12"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
          - bind-address=127.0.0.1
          - use-service-account-credentials=true
        kube-proxy-arg:
          - "ipvs-strict-arp=true"
        kube-scheduler-arg:
          - "tls-min-version=VersionTLS12"
          - "tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        kubelet-arg:
          - authorization-mode=Webhook
          - anonymous-auth=false
          - streaming-connection-idle-timeout=5m
          - read-only-port=0
        profile: cis
        protect-kernel-defaults: true
        selinux: true
        service-cidr: 10.43.0.0/16
        write-kubeconfig-mode: "0600"
        # keep-sorted end
      audit:
        rules:
          - level: None
      podSecurity:
        plugins:
          - name: PodSecurity
            configuration:
              apiVersion: pod-security.admission.config.k8s.io/v1beta1
              kind: PodSecurityConfiguration
              defaults:
                enforce: "restricted"
                enforce-version: "latest"
                audit: "restricted"
                audit-version: "latest"
                warn: "restricted"
                warn-version: "latest"
              exemptions:
                usernames: []
                runtimeClasses: []
                namespaces:
                  - kube-system
                  - rook-ceph
                  - zarf
      manifest:
        rke2-cilium: |-
          kubeProxyReplacement: true
          k8sServiceHost: "localhost"
          k8sServicePort: "6443"
          encryption:
            enabled: true
            type: wireguard
          tolerations:
            - operator: Exists
          operator:
            tolerations:
              - operator: Exists
    os:
      sysctl:
        # Istio related sysctl overrides
        "fs.inotify.max_user_watches": "11048576"
        "fs.inotify.max_user_instances": "8192"
        # Misc performance
        "vm.max_map_count": "262144"
        "fs.file-max": "2097152"
        # Network tuning
        "net.core.somaxconn": "32768"
        "net.ipv4.tcp_max_syn_backlog": "8192"
        "net.core.netdev_max_backlog": "16384"
        # NFTABLES
        "net.netfilter.nf_conntrack_max": "1000000"
        "net.netfilter.nf_conntrack_buckets": "250000"
        "net.netfilter.nf_conntrack_tcp_timeout_established": "86400"
        "net.netfilter.nf_conntrack_tcp_timeout_close_wait": "3600"
        # Network
        "net.ipv4.ip_forward": "1"
        "net.ipv6.conf.all.forwarding": "1"
        "net.bridge.bridge-nf-call-iptables": "1"
        "net.bridge.bridge-nf-call-ip6tables": "1"
        # RKE2 related sysctl overrides
        "vm.panic_on_oom": "0"
        "vm.overcommit_memory": "1"
        "kernel.panic": "10"
        "kernel.panic_on_oops": "1"
      fapolicyd: |
        # Allow RKE2 to function
        allow perm=any all : dir=/opt/cni/
        allow perm=any all : dir=/run/k3s/
        allow perm=any all : dir=/var/lib/kubelet/
        allow perm=any all : dir=/var/lib/rancher/
      files:
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-common-1.35.0~rke2r3-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-common-1.35.0~rke2r3-0.el9.x86_64.rpm
          selector:
            package: rpm
        - source: https://rpm.rancher.io/rke2/latest/common/centos/9/noarch/rke2-selinux-0.22-1.el9.noarch.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-selinux-0.22-1.el9.noarch.rpm
          selector:
            package: rpm
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-server-1.35.0~rke2r3-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-server-1.35.0~rke2r3-0.el9.x86_64.rpm
          selector:
            package: rpm
            profile: controller
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-agent-1.35.0~rke2r3-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-agent-1.35.0~rke2r3-0.el9.x86_64.rpm
          selector:
            package: rpm
            profile: worker
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2
          target: /usr/local/bin/rke2
          executable: true
          selector:
            package: binary
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2-killall.sh
          target: /usr/local/bin/rke2-killall.sh
          executable: true
          selector:
            package: binary
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2-uninstall.sh
          target: /usr/local/bin/rke2-uninstall.sh
          executable: true
          selector:
            package: binary
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: lib/systemd/system/rke2-server.service
          target: /etc/systemd/system/rke2-server.service
          symlinks:
            - /etc/systemd/system/multi-user.target.wants/rke2-server.service
          selector:
            package: binary
            profile: controller
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: lib/systemd/system/rke2-agent.service
          target: /etc/systemd/system/rke2-agent.service
          symlinks:
            - /etc/systemd/system/multi-user.target.wants/rke2-agent.service
          selector:
            package: binary
            profile: worker
        - source: https://rpm.rancher.io/rke2/latest/common/centos/9/noarch/rke2-selinux-0.22-1.el9.noarch.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-selinux-0.22-1.el9.noarch.rpm
          selector:
            package: binary
    files:
      - source: ../core/cache.json
        target: /var/lib/rancher/rke2/agent/images/.cache.json
    imageConfig:
      path: /var/lib/rancher/rke2/agent/images
      compression: none
      images:
        - docker.io/rancher/rke2-runtime:v1.35.0-rke2r3
        - docker.io/rancher/hardened-kubernetes:v1.35.0-rke2r3-build20260127
        - docker.io/rancher/hardened-coredns:v1.14.1-build20260116
        - docker.io/rancher/hardened-cluster-autoscaler:v1.10.2-build20260116
        - docker.io/rancher/hardened-dns-node-cache:1.26.7-build20260119
        - docker.io/rancher/hardened-etcd:v3.6.7-k3s1-build20260126
        - docker.io/rancher/hardened-k8s-metrics-server:v0.8.0-build20260116
        - docker.io/rancher/hardened-addon-resizer:1.8.23-build20260119
        - docker.io/rancher/klipper-helm:v0.9.12-build20251215
        - docker.io/rancher/klipper-lb:v0.4.13
        - docker.io/rancher/mirrored-pause:3.6
        - docker.io/rancher/mirrored-ingress-nginx-kube-webhook-certgen:v1.6.7
        - docker.io/rancher/nginx-ingress-controller:v1.14.3-hardened1
        - docker.io/rancher/rke2-cloud-provider:v1.35.0-rc1.0.20251218152248-a6c6cd15c0c4-build20251219
        - docker.io/rancher/hardened-snapshot-controller:v8.4.0-build20260108
        - docker.io/rancher/mirrored-cilium-certgen:v0.3.1
        - docker.io/rancher/mirrored-cilium-cilium:v1.18.6
        - docker.io/rancher/mirrored-cilium-cilium-envoy:v1.35.9-1767794330-db497dd19e346b39d81d7b5c0dedf6c812bcc5c9
        - docker.io/rancher/mirrored-cilium-clustermesh-apiserver:v1.18.6
        - docker.io/rancher/mirrored-cilium-hubble-relay:v1.18.6
        - docker.io/rancher/mirrored-cilium-hubble-ui:v0.13.3
        - docker.io/rancher/mirrored-cilium-hubble-ui-backend:v0.13.3
        - docker.io/rancher/mirrored-cilium-operator-aws:v1.18.6
        - docker.io/rancher/mirrored-cilium-operator-azure:v1.18.6
        - docker.io/rancher/mirrored-cilium-operator-generic:v1.18.6
        - docker.io/rancher/hardened-cni-plugins:v1.9.0-build20260116
