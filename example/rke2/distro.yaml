---
# yaml-language-server: $schema=../../schema/zarf-v1alpha1-distro-package-schema.json
kind: ZarfDistro
metadata:
  name: rancher-rke2
  version: 1.35.2-rke2r1
  architecture: amd64
spec:
  actions:
    onCreate:
      before:
        - description: pull rke2 tar-ball
          cmd: |-
            rm -rf   target
            mkdir -p target
            echo https://github.com/rancher/rke2/releases/download/v1.35.2%2Brke2r1/rke2.linux-amd64.tar.gz
            curl -L -o ./target/rke2.linux-amd64.tar.gz https://github.com/rancher/rke2/releases/download/v1.35.2%2Brke2r1/rke2.linux-amd64.tar.gz
  config:
    os:
      sysctl:
        # Istio related sysctl overrides
        "fs.inotify.max_user_watches": "11048576"
        "fs.inotify.max_user_instances": "1024"
        # RKE2 related sysctl overrides
        "vm.panic_on_oom": "0"
        "vm.overcommit_memory": "1"
        "kernel.panic": "10"
        "kernel.panic_on_oops": "1"
      fapolicyd: |
        # Allow RKE2 to function

        allow perm=any all : dir=/var/lib/rancher/
        allow perm=any all : dir=/opt/cni/
        allow perm=any all : dir=/run/k3s/
        allow perm=any all : dir=/var/lib/kubelet/
      files:
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-common-1.35.2~rke2r1-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-common-1.35.2~rke2r1-0.el9.x86_64.rpm
          selector:
            package: rpm
        - source: https://rpm.rancher.io/rke2/latest/common/centos/9/noarch/rke2-selinux-0.22-1.el9.noarch.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-selinux-0.22-1.el9.noarch.rpm
          selector:
            package: rpm
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-server-1.35.2~rke2r1-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-server-1.35.2~rke2r1-0.el9.x86_64.rpm
          selector:
            package: rpm
            profile: controller
        - source: https://rpm.rancher.io/rke2/latest/1.35/centos/9/x86_64/rke2-agent-1.35.2~rke2r1-0.el9.x86_64.rpm
          target: /var/lib/rancher/rke2/rpm/rke2-agent-1.35.2~rke2r1-0.el9.x86_64.rpm
          selector:
            package: rpm
            profile: worker
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2
          target: /usr/local/bin/rke2
          executable: true
          selector:
            package: binary
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2-killall.sh
          target: /usr/local/bin/rke2-killall.sh
          executable: true
          selector:
            package: binary
        - source: target/rke2.linux-amd64.tar.gz
          extractPath: bin/rke2-uninstall.sh
          target: /usr/local/bin/rke2-uninstall.sh
          executable: true
          selector:
            package: binary
    files:
      - source: cache.json
        target: /var/lib/rancher/rke2/agent/images/.cache.json
    imageConfig:
      path: /var/lib/rancher/rke2/agent/images
      compression: none
      images:
        - docker.io/rancher/rke2-runtime:v1.35.2-rke2r1
        - docker.io/rancher/hardened-kubernetes:v1.35.2-rke2r1-build20260227
        - docker.io/rancher/hardened-coredns:v1.14.1-build20260206
        - docker.io/rancher/hardened-cluster-autoscaler:v1.10.3-build20260206
        - docker.io/rancher/hardened-dns-node-cache:1.26.7-build20260206
        - docker.io/rancher/hardened-etcd:v3.6.7-k3s1-build20260227
        - docker.io/rancher/hardened-k8s-metrics-server:v0.8.1-build20260206
        - docker.io/rancher/hardened-addon-resizer:1.8.23-build20260206
        - docker.io/rancher/klipper-helm:v0.9.14-build20260210
        - docker.io/rancher/klipper-lb:v0.4.14
        - docker.io/rancher/mirrored-pause:3.6
        - docker.io/rancher/mirrored-ingress-nginx-kube-webhook-certgen:v1.6.7
        - docker.io/rancher/nginx-ingress-controller:v1.14.3-hardened3
        - docker.io/rancher/rke2-cloud-provider:v1.35.1-0.20260211145923-50fa2d70c239-build20260211
        - docker.io/rancher/hardened-snapshot-controller:v8.4.0-build20260205
